<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OBJECT-03</title>

<style>
@font-face {
  font-family: "MyFont";
  src: url("myfont.ttf") format("truetype");
}

html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: #050505;
  color: #e8e8e8;
  font-family: "MyFont", "Noto Serif TC", "Microsoft JhengHei", serif;
}

body {
  background-image: url("background.jpg");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 1;
}

.noise {
  position: fixed;
  inset: 0;
  z-index: 2;
  pointer-events: none;
  opacity: 0.18;
  background-image: repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.05) 0px,
    rgba(255,255,255,0.05) 1px,
    transparent 1px,
    transparent 4px
  );
}

.ui {
  position: fixed;
  inset: 0;
  z-index: 3;
  padding: 24px;
  box-sizing: border-box;
  color: #aaa;
  font-family: "MyFont", monospace;
  font-size: 14px;
  letter-spacing: 1px;
}

.rec {
  position: absolute;
  top: 24px;
  right: 24px;
  color: #ff2a2a;
}

.container {
  position: relative;
  z-index: 4;
  width: 86%;
  max-width: 1000px;
  height: 100%;
  margin: auto;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;
}

.log {
  font-size: 18px;
  letter-spacing: 4px;
  color: #888;
  margin-bottom: 28px;
}

.text {
  font-size: clamp(32px, 5vw, 68px);
  line-height: 1.5;
  letter-spacing: 2px;
  color: #ffffff;

  text-shadow:
    0 0 10px rgba(255,255,255,0.4),
    0 0 20px rgba(255,255,255,0.2);

  opacity: 0;
  transition: opacity 1s ease;
}

.text.show {
  opacity: 1;
}

.warning {
  color: #ff2a2a;
  font-size: 1.5em;

  text-shadow:
    0 0 10px rgba(255,0,0,0.8),
    0 0 30px rgba(255,0,0,0.6);
}

.tap {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 5;
  color: #777;
  font-size: 13px;
  letter-spacing: 2px;
}
</style>
</head>

<body>
<div class="overlay"></div>
<div class="noise"></div>

<div class="ui">
  <div>CAM-03 // OBJECT-03</div>
  <div id="time">02:14:11</div>
  <div class="rec">● LIVE</div>
</div>

<div class="container">
  <div class="log" id="log">檔案 01</div>
  <div class="text" id="text"></div>
</div>

<div class="tap">TAP TO ENABLE AUDIO</div>

<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const entries = [
  ["觀察記錄 01", "一件普通潔白的襯衫。"],
  ["觀察記錄 02", "請記住牠此時的樣子。"],
  ["觀察記錄 03", "請不要忽略任何微小的改變。"],
  ["觀察記錄 04", "牠只在沒有人注視的時候移動。"],
  ["觀察記錄 05", "你發現了嗎？"],
  ["觀察記錄 06", "領帶變長了。"],
  ["觀察記錄 07", "牠正在看著你。"],
  ["觀察記錄 08", "千萬不要按求救鈕。"],
  ["觀察記錄 09", "牠會發現你。"],
  ["觀察記錄 10", "<span class='warning'>別按。</span>"]
];

const logEl = document.getElementById("log");
const textEl = document.getElementById("text");
const timeEl = document.getElementById("time");
const bgm = document.getElementById("bgm");

let index = 0;
let seconds = 11;

function showEntry() {
  textEl.classList.remove("show");

  setTimeout(() => {
    logEl.textContent = entries[index][0];
    textEl.innerHTML = entries[index][1];
    textEl.classList.add("show");

    seconds += 6;
    timeEl.textContent = "02:14:" + String(seconds).padStart(2, "0");

    index = (index + 1) % entries.length;

    if (index === 0) {
      seconds = 11;
    }
  }, 500);
}

showEntry();
setInterval(showEntry, 6000);

function playAudio() {
  bgm.play();
  document.querySelector(".tap").style.display = "none";
}

document.body.addEventListener("click", playAudio, { once: true });
document.body.addEventListener("touchstart", playAudio, { once: true });
</script>
</body>
</html>
